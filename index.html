<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricSlide Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');
        :root { --primary-color: #334155; --bg-start: #f8fafc; --bg-end: #f8fafc; --text-main: #1e293b; --preview-card-bg: #ffffff; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%); color: var(--text-main); }
        .glass { background: white; border: 1px solid #e2e8f0; border-radius: 12px; }
        .btn-primary { background: var(--primary-color); color: white; border-radius: 12px; font-weight: 700; }
        .tab-btn { padding: 12px 24px; cursor: pointer; color: #64748b; font-weight: 600; }
        .tab-btn.active { color: var(--primary-color); background: white; border: 1px solid #e2e8f0; border-radius: 12px; }
        .preview-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; font-family: 'Courier New', Courier, monospace; white-space: pre; aspect-ratio: 16/9; overflow: hidden; }
        .chord { color: #334155; font-weight: 900; }
        #themeSidebar { position: fixed; right: -350px; top: 0; bottom: 0; width: 320px; z-index: 1001; transition: right 0.4s; background: white; border-left: 1px solid #e2e8f0; }
        #themeSidebar.open { right: 0; }
        .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.1); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }
        .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .template-card { border: 2px solid #e2e8f0; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .template-card.selected { border-color: var(--primary-color); background: #f8fafc; }
        .template-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .template-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <button onclick="App.toggleThemeSidebar()" class="fixed top-8 right-8 w-12 h-12 glass flex items-center justify-center text-slate-500 z-[1002]"><i class="fas fa-palette"></i></button>
    <div id="sidebarBackdrop" class="sidebar-backdrop" onclick="App.toggleThemeSidebar()"></div>
    <div id="themeSidebar" class="p-6 overflow-y-auto">
        <h2 class="text-xl font-black mb-6">Customizer</h2>
        <div class="space-y-4">
            <div class="flex justify-between items-center"><span>Primary</span><input type="color" id="picker-primary" class="color-picker-input"></div>
            <div class="flex justify-between items-center"><span>Background</span><input type="color" id="picker-bg-start" class="color-picker-input"></div>
            <div class="flex justify-between items-center"><span>Text</span><input type="color" id="picker-text" class="color-picker-input"></div>
            <button onclick="App.theme.reset()" class="w-full py-2 text-xs font-bold text-slate-400 mt-4">Reset</button>
        </div>
    </div>
    <header class="max-w-[1400px] mx-auto mb-10 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="TOP Logo.png" class="w-16 h-16 rounded-full bg-white border object-contain" alt="Logo">
            <div><h1 class="text-2xl font-black">LyricSlide Pro</h1><p id="appVersion" class="text-[10px] text-slate-400 font-mono"></p></div>
        </div>
        <div class="glass p-1 flex"><div id="modeGen" class="tab-btn active" onclick="App.setMode('gen')">Create</div><div id="modeTrans" class="tab-btn" onclick="App.setMode('trans')">Transpose</div></div>
    </header>
    <main class="max-w-[1400px] mx-auto">
        <div id="viewGen" class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-4"><h3 class="font-bold text-sm mb-2">Templates</h3><p id="dirName" class="text-xs text-slate-400 mb-4">Loading...</p><div id="templateGallery"></div></div>
                <div id="selectedTemplateInfo" class="hidden glass p-3 flex justify-between items-center"><span id="selectedTemplateName" class="text-xs font-bold truncate"></span><button onclick="App.clearTemplate()" class="text-slate-300"><i class="fas fa-times"></i></button></div>
            </div>
            <div class="lg:col-span-8 glass p-6 space-y-4">
                <input type="text" id="songTitle" class="w-full p-3" placeholder="Song Title">
                <textarea id="lyricsInput" rows="10" class="w-full p-3 font-mono text-sm" placeholder="Chords & Lyrics..."></textarea>
                <input type="text" id="copyrightInfo" class="w-full p-3" placeholder="Copyright Info">
                <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-xl">
                    <span class="text-sm font-bold">Alignment:</span>
                    <select id="alignmentSelect" class="flex-1 p-2 text-sm bg-white border-slate-200 rounded-lg">
                        <option value="smart">Smart (Centered Lyrics)</option>
                        <option value="l">Left (Standard)</option>
                    </select>
                </div>
                <button id="generateBtn" class="w-full py-4 btn-primary">Generate PowerPoint</button>
            </div>
        </div>
        <div id="viewTrans" class="hidden space-y-6">
            <div class="glass p-8 grid md:grid-cols-3 gap-6 items-center">
                <div class="border rounded-xl p-6 text-center cursor-pointer" onclick="document.getElementById('transFileInput').click()">
                    <input type="file" id="transFileInput" class="hidden" accept=".pptx">
                    <p id="transFileName" class="text-sm text-slate-400">Upload PPTX</p>
                </div>
                <div class="flex items-center justify-between border p-2 rounded-xl">
                    <button onclick="App.changeSemitones(-1)" class="w-10 h-10 glass font-bold">−</button>
                    <span id="semitoneDisplay" class="text-2xl font-black">0</span>
                    <button onclick="App.changeSemitones(1)" class="w-10 h-10 glass font-bold">+</button>
                </div>
                <button id="transposeBtn" class="h-full py-4 btn-primary">Download Transposed</button>
            </div>
            <div id="previewContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6 glass"></div>
        </div>
    </main>
    <div id="loadingOverlay" class="loading-overlay"><div class="spinner mb-4"></div><p id="loadingText" class="text-sm">Processing...</p></div>
    <script src="app.js"></script>
</body>
</html>
