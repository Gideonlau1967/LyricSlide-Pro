<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>LyricSlide Pro - Song Generator & Transposer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');
        
        :root {
            --primary-color: #334155;
            --primary-gradient: #334155;
            --bg-start: #f8fafc;
            --bg-end: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --card-accent: #e2e8f0;
            --preview-card-bg: #ffffff;
            --preview-chord-color: #334155;
            --preview-lyrics-color: #1e293b;
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        .glass { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; }
        .btn-primary { background: var(--primary-color); color: white; transition: all 0.2s ease; }
        .btn-primary:hover { opacity: 0.9; }

        .tab-btn {
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--text-muted);
        }

        .tab-btn.active { background: white; border: 1px solid #e2e8f0; color: var(--primary-color); }

        input, textarea, select {
            background: var(--input-bg) !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 12px !important;
            color: var(--text-main) !important;
        }

        input:focus, textarea:focus { border-color: var(--primary-color) !important; background: white !important; outline: none; }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px);
        }

        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* PREVIEW STYLING - Mimicking Monospaced PPT Output */
        .preview-card {
            background: var(--preview-card-bg); border-radius: 8px; padding: 24px; 
            font-family: 'Consolas', 'Courier New', monospace; 
            white-space: pre; overflow: auto; border: 1px solid #e2e8f0; font-size: 1.1rem; line-height: 1.3;
            aspect-ratio: 16 / 9; width: 100%; display: flex; flex-direction: column; position: relative; color: var(--preview-lyrics-color);
        }

        /* Chords are smaller in the preview to match the 18pt logic */
        .chord { color: var(--preview-chord-color); font-weight: 900; font-size: 0.8em; }
        
        .slide-content { transform-origin: top center; width: 100%; transition: transform 0.1s ease-out; display: block; text-align: center; }
        .preview-card-wrapper { width: 100%; overflow: visible; display: flex; justify-content: center; min-height: 0; }

        #themeSidebar { position: fixed; right: -350px; top: 20px; bottom: 20px; width: 320px; z-index: 1001; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #themeSidebar.open { right: 20px; }

        .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

        .color-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(0,0,0,0.03); border-radius: 12px; margin-bottom: 8px; }

        .color-picker-input { width: 40px; height: 40px; padding: 0; border: none !important; border-radius: 20px !important; cursor: pointer; overflow: hidden; }
        .color-picker-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker-input::-webkit-color-swatch { border: none; border-radius: 20px; }

        .logo-shadow { box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.15); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .template-card { border-radius: 10px; border: 2px solid #e2e8f0; cursor: pointer; transition: all 0.18s ease; overflow: hidden; background: white; }
        .template-card:hover { border-color: var(--primary-color); transform: translateY(-2px); }
        .template-card.selected { border-color: var(--primary-color); background: rgba(51,65,85,0.04); }
        .template-thumb { aspect-ratio: 16/9; width: 100%; object-fit: cover; display: block; background: #f1f5f9; }
        .template-thumb-placeholder { aspect-ratio: 16/9; width: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color: #94a3b8; font-size: 1.5rem; }
        .template-card-name { padding: 6px 8px; font-size: 10px; font-weight: 600; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; border-top: 1px solid #f1f5f9; }
        #templateGallery { max-height: 420px; overflow-y: auto; }
    </style>
</head>
