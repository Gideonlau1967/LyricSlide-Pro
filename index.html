<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricSlide Pro - Generator & Transposer</title>
    
    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');
        
        :root {
            --primary-color: #334155;
            --bg-start: #f8fafc;
            --bg-end: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --preview-card-bg: #ffffff;
            --preview-chord-color: #334155;
            --preview-lyrics-color: #1e293b;
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            color: var(--text-main);
            transition: background 0.3s ease;
        }

        .glass { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; }
        .btn-primary { background: var(--primary-color); color: white; transition: all 0.2s ease; }
        .btn-primary:hover { opacity: 0.9; }

        .tab-btn { padding: 12px 24px; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-weight: 600; color: var(--text-muted); }
        .tab-btn.active { background: white; border: 1px solid #e2e8f0; color: var(--primary-color); }

        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .preview-card { background: var(--preview-card-bg); border-radius: 8px; padding: 20px; border: 1px solid #e2e8f0; aspect-ratio: 16 / 9; width: 100%; display: flex; flex-direction: column; color: var(--preview-lyrics-color); font-size: 1.2rem; line-height: 1.4; overflow: hidden; }
        .chord { color: var(--preview-chord-color); font-weight: 900; font-family: monospace; }
        .slide-content { transform-origin: top center; width: 100%; }

        .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .template-card { border-radius: 10px; border: 2px solid #e2e8f0; cursor: pointer; transition: all 0.18s ease; overflow: hidden; background: white; }
        .template-card.selected { border-color: var(--primary-color); background: rgba(51,65,85,0.04); }
        .template-thumb { aspect-ratio: 16/9; width: 100%; object-fit: cover; background: #f1f5f9; }
        .template-card-name { padding: 6px; font-size: 10px; font-weight: 700; text-align: center; color: #64748b; }

        #themeSidebar { position: fixed; right: -350px; top: 20px; bottom: 20px; width: 320px; z-index: 1001; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #themeSidebar.open { right: 20px; }
        .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }
        .color-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: rgba(0,0,0,0.03); border-radius: 8px; margin-bottom: 4px; }
        .color-picker-input { width: 34px; height: 34px; border: none; border-radius: 50%; cursor: pointer; }
        
        /* Version Badges */
        .ver-badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: #e2e8f0; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Customizer Toggle -->
    <button onclick="toggleThemeSidebar()" class="fixed top-8 right-8 w-12 h-12 glass flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-all z-[1002]">
        <i class="fas fa-palette text-xl"></i>
    </button>

    <!-- Sidebar -->
    <div id="sidebarBackdrop" class="sidebar-backdrop" onclick="toggleThemeSidebar()"></div>
    <div id="themeSidebar" class="glass p-6 overflow-y-auto">
        <h2 class="text-xl font-black mb-6">Customizer</h2>
        <div class="space-y-4">
            <div class="color-row"><span>Primary Accent</span><input type="color" id="picker-primary" class="color-picker-input"></div>
            <div class="color-row"><span>BG Start</span><input type="color" id="picker-bg-start" class="color-picker-input"></div>
            <div class="color-row"><span>BG End</span><input type="color" id="picker-bg-end" class="color-picker-input"></div>
            <div class="color-row"><span>Text Main</span><input type="color" id="picker-text" class="color-picker-input"></div>
            <div class="color-row"><span>Chord Color</span><input type="color" id="picker-chord" class="color-picker-input"></div>
            <div class="color-row"><span>Lyrics Color</span><input type="color" id="picker-lyrics" class="color-picker-input"></div>
            <button onclick="resetTheme()" class="w-full py-3 text-xs font-bold text-slate-400 uppercase mt-4">Reset Defaults</button>
        </div>
    </div>

    <!-- Header -->
    <header class="max-w-[1600px] mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-4">
            <img src="TOP Logo.png" class="w-20 h-20 rounded-full bg-white object-contain border" alt="Logo">
            <div>
                <h1 class="text-3xl font-black tracking-tight">LyricSlide Pro</h1>
                <p class="text-sm font-medium" style="color: var(--text-muted)">Professional Song Deck Utility</p>
                <div class="flex gap-2 mt-1.5">
                    <span class="ver-badge">Gen: <span id="genVer">...</span></span>
                    <span class="ver-badge">Trans: <span id="transVer">...</span></span>
                </div>
            </div>
        </div>
        
        <div class="glass p-1 flex gap-2">
            <div id="modeGen" class="tab-btn active" onclick="setMode('gen')">Create</div>
            <div id="modeTrans" class="tab-btn" onclick="setMode('trans')">Transpose</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto">
        
        <!-- GENERATE VIEW -->
        <div id="viewGen" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-4">
                    <h3 class="font-bold text-sm mb-1">Templates</h3>
                    <p id="dirName" class="text-slate-400 text-[10px] truncate mb-4">Loading templates...</p>
                    <div id="templateGallery"></div>
                </div>
                <div id="selectedTemplateInfo" class="hidden glass p-3 flex items-center gap-3">
                    <i class="fas fa-check-circle text-green-500 text-sm"></i>
                    <p class="text-xs font-bold truncate" id="selectedTemplateName">—</p>
                    <button onclick="clearTemplate()" class="ml-auto text-slate-300 text-xs"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="lg:col-span-8 glass p-8 space-y-6">
                <input type="text" id="songTitle" class="w-full p-4 border rounded-xl" placeholder="Song Title">
                <textarea id="lyricsInput" rows="10" class="w-full p-4 border rounded-xl font-mono text-sm" placeholder="Paste Chords & Lyrics here..."></textarea>
                <input type="text" id="copyrightInfo" class="w-full p-4 border rounded-xl" placeholder="Copyright Info">
                <button id="generateBtn" class="w-full py-4 btn-primary rounded-xl font-bold">Generate PowerPoint</button>
            </div>
        </div>

        <!-- TRANSPOSE VIEW -->
        <div id="viewTrans" class="hidden space-y-8">
            <div class="glass p-8 grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                <div class="border rounded-xl p-6 text-center cursor-pointer hover:bg-slate-50" onclick="document.getElementById('transFileInput').click()">
                    <input type="file" id="transFileInput" class="hidden" accept=".pptx">
                    <p id="transFileName" class="text-sm text-slate-400 font-medium truncate">Upload Song PPTX</p>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-white p-2 rounded-xl border">
                        <button onclick="changeSemitones(-1)" class="w-10 h-10 glass font-bold">−</button>
                        <span id="semitoneDisplay" class="text-3xl font-black">0</span>
                        <button onclick="changeSemitones(1)" class="w-10 h-10 glass font-bold">+</button>
                    </div>
                    <div class="px-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase flex justify-between">Zoom <span id="zoomVal">100%</span></label>
                        <input type="range" id="zoomSlider" min="50" max="200" value="100" class="w-full h-1 mt-2 appearance-none bg-slate-200 rounded cursor-pointer" oninput="updateZoom(this.value)">
                    </div>
                </div>

                <button id="transposeBtn" class="h-full py-4 btn-primary rounded-xl font-bold">Download Transposed</button>
            </div>

            <div class="glass p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-slate-700">Preview</h3>
                    <span id="slideCount" class="text-[10px] font-bold text-slate-400">0 SLIDES</span>
                </div>
                <div id="previewContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>

    </main>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <p id="loadingText" class="text-sm font-medium">Processing...</p>
    </div>

    <!-- SCRIPTS -->
    <script src="generate.js"></script>
    <script src="transpose.js"></script>

    <script>
        // Display versioning from scripts
        window.addEventListener('load', () => {
            if(window.LyricApp) {
                document.getElementById('genVer').textContent = window.LyricApp.version || 'v19.5';
                document.getElementById('transVer').textContent = 'v12.0';
            }
        });

        function toggleThemeSidebar() {
            document.getElementById('themeSidebar').classList.toggle('open');
            document.getElementById('sidebarBackdrop').classList.toggle('open');
        }

        function resetTheme() {
            if (confirm('Reset to defaults?')) {
                const def = window.LyricApp.theme.defaults;
                Object.keys(def).forEach(k => document.documentElement.style.setProperty(k, def[k]));
                localStorage.removeItem('lyric_theme');
            }
        }

        function setMode(mode) {
            const isGen = mode === 'gen';
            document.getElementById('modeGen').classList.toggle('active', isGen);
            document.getElementById('modeTrans').classList.toggle('active', !isGen);
            document.getElementById('viewGen').classList.toggle('hidden', !isGen);
            document.getElementById('viewTrans').classList.toggle('hidden', isGen);
        }

        function updateZoom(val) {
            document.getElementById('zoomVal').textContent = val + '%';
            document.querySelectorAll('.slide-content').forEach(el => el.style.transform = `scale(${val / 100})`);
        }

        function changeSemitones(delta) { window.changeSemitones(delta); }

        function clearTemplate() {
            window.LyricApp.selectedTemplateFile = null;
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('selectedTemplateInfo').classList.add('hidden');
        }

        document.getElementById('transFileInput').addEventListener('change', async e => {
            if(e.target.files[0]) {
                document.getElementById('transFileName').textContent = e.target.files[0].name;
                document.getElementById('slideCount').textContent = 'Loading...';
                await window.LyricApp.loadForPreview(e.target.files[0]);
                document.getElementById('slideCount').textContent = window.LyricApp.originalSlides.length + ' SLIDES';
            }
        });
    </script>
</body>
</html>
